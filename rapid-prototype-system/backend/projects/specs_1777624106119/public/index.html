<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>SciCalc</title><link rel="stylesheet" href="https://cdn.tailwindcss.com"><style>body {background-color: #f0f0f0;}</style></head><body class="h-screen flex justify-center items-center"><div class="bg-white p-8 rounded-lg shadow-md w-1/2"><h1 class="text-3xl font-bold mb-4">SciCalc</h1><div class="flex flex-wrap justify-center mb-4"><button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded mr-2" onclick="calculate()">Calculate</button><button class="bg-red-500 hover:bg-red-700 text-white font-bold py-2 px-4 rounded" onclick="clearHistory()">Clear History</button></div><div class="mb-4"><input type="text" id="expression" class="w-full p-2 border border-gray-400 rounded" placeholder="Enter expression"></div><div class="mb-4"><input type="text" id="result" class="w-full p-2 border border-gray-400 rounded" placeholder="Result" readonly></div><div class="mb-4"><select id="unit" class="w-full p-2 border border-gray-400 rounded"><option value="">Select unit</option><option value="length">Length</option><option value="area">Area</option><option value="volume">Volume</option><option value="temperature">Temperature</option></select></div><div id="history" class="mb-4"></div><script>let history = []; function calculate() {const expression = document.getElementById('expression').value; const result = eval(expression); document.getElementById('result').value = result; history.push({expression, result}); updateHistory();} function clearHistory() {history = []; updateHistory();} function updateHistory() {const historyDiv = document.getElementById('history'); historyDiv.innerHTML = ''; history.forEach((item, index) => {const paragraph = document.createElement('p'); paragraph.textContent = `${index + 1}. ${item.expression} = ${item.result}`; historyDiv.appendChild(paragraph);});}</script></div></body></html>
