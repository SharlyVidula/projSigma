<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RecruitHub</title>
  <link rel="stylesheet" href="https://cdn.tailwindcss.com">
</head>
<body class="bg-gray-900">
  <header class="bg-gray-800 py-4">
    <nav class="container mx-auto flex justify-between">
      <a href="#" class="text-lg font-bold text-white">RecruitHub</a>
      <ul class="flex items-center">
        <li class="mr-6">
          <a href="#" class="text-white hover:text-gray-300">Dashboard</a>
        </li>
        <li class="mr-6">
          <a href="#" class="text-white hover:text-gray-300">Resume Parser</a>
        </li>
      </ul>
    </nav>
  </header>
  <main class="container mx-auto p-4 pt-6 md:p-6 lg:p-12 xl:p-24">
    <section class="bg-white rounded shadow-md p-4">
      <h2 class="text-lg font-bold mb-4">Statistical Overview</h2>
      <div class="flex flex-wrap -mx-4">
        <div class="w-full md:w-1/2 xl:w-1/3 p-4">
          <div class="bg-gray-100 rounded shadow-md p-4">
            <h3 class="text-lg font-bold mb-4">Total Applications</h3>
            <p class="text-3xl font-bold">100</p>
          </div>
        </div>
        <div class="w-full md:w-1/2 xl:w-1/3 p-4">
          <div class="bg-gray-100 rounded shadow-md p-4">
            <h3 class="text-lg font-bold mb-4">Hiring Rate</h3>
            <p class="text-3xl font-bold">20%</p>
          </div>
        </div>
      </div>
    </section>
    <section class="bg-white rounded shadow-md p-4 mt-6">
      <h2 class="text-lg font-bold mb-4">Candidate Pipeline</h2>
      <div class="flex flex-wrap -mx-4">
        <div class="w-full md:w-1/3 xl:w-1/3 p-4">
          <div class="bg-gray-100 rounded shadow-md p-4">
            <h3 class="text-lg font-bold mb-4">Applied</h3>
            <ul>
              <li class="mb-4">
                <div class="bg-white rounded shadow-md p-4">
                  <h4 class="text-lg font-bold mb-2">John Doe</h4>
                  <p>Software Engineer</p>
                </div>
              </li>
            </ul>
          </div>
        </div>
        <div class="w-full md:w-1/3 xl:w-1/3 p-4">
          <div class="bg-gray-100 rounded shadow-md p-4">
            <h3 class="text-lg font-bold mb-4">Interviewing</h3>
            <ul>
              <li class="mb-4">
                <div class="bg-white rounded shadow-md p-4">
                  <h4 class="text-lg font-bold mb-2">Jane Doe</h4>
                  <p>Marketing Manager</p>
                </div>
              </li>
            </ul>
          </div>
        </div>
        <div class="w-full md:w-1/3 xl:w-1/3 p-4">
          <div class="bg-gray-100 rounded shadow-md p-4">
            <h3 class="text-lg font-bold mb-4">Hired</h3>
            <ul>
              <li class="mb-4">
                <div class="bg-white rounded shadow-md p-4">
                  <h4 class="text-lg font-bold mb-2">Bob Smith</h4>
                  <p>Sales Representative</p>
                </div>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </section>
  </main>
  <script>
    // wattage calculator
    function calculateWattage(voltage, current) {
      return voltage * current;
    }
    // compatibility checks
    function checkCompatibility(candidates, skills) {
      const compatibleCandidates = [];
      candidates.forEach((candidate) => {
        if (candidate.skills.includes(skills)) {
          compatibleCandidates.push(candidate);
        }
      });
      return compatibleCandidates;
    }
    // update DOM
    function updateDOM(candidates) {
      const candidateList = document.getElementById('candidate-list');
      candidateList.innerHTML = '';
      candidates.forEach((candidate) => {
        const candidateHTML = `
          <div class="bg-white rounded shadow-md p-4">
            <h4 class="text-lg font-bold mb-2">${candidate.name}</h4>
            <p>${candidate.skills}</p>
          </div>
        `;
        candidateList.innerHTML += candidateHTML;
      });
    }
  </script>
</body>
</html>
