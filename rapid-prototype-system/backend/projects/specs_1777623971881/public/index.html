<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Hotel Master</title><link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"><style>body { background-color: #f0f0f0; }</style></head><body class="h-screen flex justify-center items-center"><div class="container mx-auto p-4 pt-6 md:p-6 lg:p-12 bg-white rounded shadow-md"><h1 class="text-3xl font-bold mb-4">Hotel Master</h1><div class="grid grid-cols-1 md:grid-cols-2 gap-4"><div class="bg-gray-100 p-4 rounded"><h2 class="text-xl font-bold mb-2">Guest Management</h2><ul id="guest-list" class="list-none mb-4"></ul><form id="check-in-form"><label for="name" class="block text-sm font-medium mb-2">Name:</label><input type="text" id="name" class="block w-full p-2 mb-4 border border-gray-300 rounded"><label for="email" class="block text-sm font-medium mb-2">Email:</label><input type="email" id="email" class="block w-full p-2 mb-4 border border-gray-300 rounded"><button type="submit" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">Check-in</button></form></div><div class="bg-gray-100 p-4 rounded"><h2 class="text-xl font-bold mb-2">Room Management</h2><ul id="room-list" class="list-none mb-4"></ul><form id="room-assignment-form"><label for="room-type" class="block text-sm font-medium mb-2">Room Type:</label><select id="room-type" class="block w-full p-2 mb-4 border border-gray-300 rounded"><option value="single">Single</option><option value="double">Double</option></select><label for="rate" class="block text-sm font-medium mb-2">Rate:</label><input type="number" id="rate" class="block w-full p-2 mb-4 border border-gray-300 rounded"><button type="submit" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">Assign Room</button></form></div></div></div><script>const guestList = document.getElementById('guest-list'); const checkInForm = document.getElementById('check-in-form'); const roomList = document.getElementById('room-list'); const roomAssignmentForm = document.getElementById('room-assignment-form'); checkInForm.addEventListener('submit', (e) => { e.preventDefault(); const name = document.getElementById('name').value; const email = document.getElementById('email').value; const guest = { id: Math.floor(Math.random() * 100), name, email }; guestList.innerHTML += `<li>${guest.name} (${guest.email})</li>`; }); roomAssignmentForm.addEventListener('submit', (e) => { e.preventDefault(); const roomType = document.getElementById('room-type').value; const rate = document.getElementById('rate').value; const room = { id: Math.floor(Math.random() * 100), type: roomType, rate }; roomList.innerHTML += `<li>${room.type} ($${room.rate})</li>`; });</script></body></html>
