<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>SciCalc</title><link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"><style>body { background-color: #f0f0f0; }</style></head><body class="h-screen flex justify-center items-center"><div class="bg-white p-8 rounded-lg shadow-md w-1/2"><h1 class="text-3xl font-bold mb-4">SciCalc</h1><input type="text" id="input-field" class="w-full p-2 mb-4 border border-gray-400 rounded" placeholder="Enter calculation"><button id="calculate-button" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">Calculate</button><p id="result" class="text-2xl font-bold mt-4"></p></div><script>const inputField = document.getElementById('input-field'); const calculateButton = document.getElementById('calculate-button'); const resultElement = document.getElementById('result'); calculateButton.addEventListener('click', () => { const calculation = inputField.value; // TO DO: implement calculation logic const result = 'Result: ' + calculation; resultElement.textContent = result; });</script></body></html>
